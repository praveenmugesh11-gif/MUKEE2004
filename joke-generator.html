<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header i {
            color: #667eea;
            font-size: 2rem;
        }

        .header p {
            color: #666;
            font-size: 1rem;
        }

        .joke-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .joke-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        .joke-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .joke-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .loading {
            display: none;
            text-align: center;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            min-width: 120px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(-1px);
        }

        .copy-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            display: none;
            animation: slideInUp 0.3s ease-out;
            z-index: 1000;
        }

        .copy-feedback.show {
            display: block;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            color: #666;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .joke-text {
                font-size: 1rem;
            }

            .button-group {
                gap: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .copy-feedback {
                left: 10px;
                right: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-laugh-beam"></i> Joke Generator</h1>
            <p>Get a random laugh every time!</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="joke-container" id="jokeContainer">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading a funny joke...</p>
            </div>
            <div id="jokeContent" style="display: none;">
                <p class="joke-text" id="jokeText"></p>
                <span class="joke-type" id="jokeType"></span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="jokeCount">0</div>
                <div>Jokes Loaded</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="copyCount">0</div>
                <div>Times Copied</div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="getJoke()">
                <i class="fas fa-dice"></i> Get Another Joke
            </button>
            <button class="btn-secondary" onclick="copyJoke()" title="Copy joke to clipboard">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="btn-secondary" onclick="shareJoke()" title="Share joke">
                <i class="fas fa-share-alt"></i> Share
            </button>
        </div>

        <div class="footer">
            <p>Using <strong>JokeAPI</strong> by <a href="https://jokeapi.dev" target="_blank" style="color: #667eea; text-decoration: none;">jokeapi.dev</a></p>
            <p style="margin-top: 10px; font-size: 0.8rem;">Made with <i class="fas fa-heart" style="color: #e74c3c;"></i> by Mugesh Praveen</p>
        </div>
    </div>

    <div class="copy-feedback" id="copyFeedback">
        <i class="fas fa-check-circle"></i> Copied to clipboard!
    </div>

    <script>
        let currentJoke = null;
        let jokeCount = 0;
        let copyCount = 0;

        // Get joke from API
        async function getJoke() {
            const loading = document.getElementById('loading');
            const jokeContent = document.getElementById('jokeContent');
            const errorMessage = document.getElementById('errorMessage');

            // Show loading state
            loading.classList.add('active');
            jokeContent.style.display = 'none';
            errorMessage.classList.remove('show');

            try {
                // Fetch from JokeAPI
                const response = await fetch('https://jokeapi.dev/random/joke?blacklistFlags=nsfw,religious,political,racist,sexist,explicit');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('Could not retrieve a joke');
                }

                // Store current joke
                currentJoke = data.setup 
                    ? `${data.setup}\n\n${data.delivery}` 
                    : data.joke;

                // Display joke
                const jokeText = document.getElementById('jokeText');
                const jokeType = document.getElementById('jokeType');

                jokeText.textContent = currentJoke;
                jokeType.textContent = data.type === 'twopart' ? '📖 Two-Part' : '⚡ Single';

                // Update counter
                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;

                // Show joke content
                loading.classList.remove('active');
                jokeContent.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = `❌ ${error.message}. Please try again!`;
                errorMessage.classList.add('show');
                loading.classList.remove('active');
            }
        }

        // Copy joke to clipboard
        function copyJoke() {
            if (!currentJoke) {
                alert('Please load a joke first!');
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                copyCount++;
                document.getElementById('copyCount').textContent = copyCount;

                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');

                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy joke');
            });
        }

        // Share joke
        function shareJoke() {
            if (!currentJoke) {
                alert('Please load a joke first!');
                return;
            }

            if (navigator.share) {
                navigator.share({
                    title: '😂 Check out this joke!',
                    text: currentJoke,
                    url: window.location.href
                }).catch(err => console.log('Share cancelled:', err));
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(currentJoke);
                alert('Joke copied to clipboard! Share it now.');
            }
        }

        // Load initial joke on page load
        window.addEventListener('load', () => {
            getJoke();
        });

        // Allow Enter key to get new joke
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getJoke();
            }
        });
    </script>
</body>
</html>
